<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TecnoMedEc | Productos Médicos</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --surface: #ffffff;
      --primary: #0b6fbf;
      --primary-dark: #095a9a;
      --accent: #12b981;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 12px 25px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .topbar {
      background: #0f172a;
      color: #e2e8f0;
      text-align: center;
      padding: 0.55rem 1rem;
      font-size: 0.9rem;
    }

    header {
      background: linear-gradient(135deg, #0b6fbf, #27a4ea);
      color: #fff;
      padding: 1rem;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }

    .brand img {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      object-fit: cover;
      border: 2px solid rgba(255, 255, 255, 0.8);
      background: #fff;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.3rem, 2.6vw, 1.8rem);
    }

    .brand p {
      margin: 0.2rem 0 0;
      opacity: 0.9;
      font-size: 0.9rem;
    }

    .search-wrap {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 12px;
      padding: 0.55rem 0.8rem;
    }

    .search-wrap input {
      width: 100%;
      border: none;
      background: transparent;
      outline: none;
      color: #fff;
      font-size: 0.98rem;
    }

    .search-wrap input::placeholder { color: #dbeafe; }

    main {
      max-width: 1200px;
      margin: 1.5rem auto 3rem;
      padding: 0 1rem;
    }

    .categoria {
      margin-bottom: 2rem;
    }

    .categoria h2 {
      margin: 0 0 1rem;
      font-size: 1.2rem;
      background: #e7f3fd;
      border: 1px solid #cde6fb;
      border-left: 5px solid var(--primary);
      border-radius: 0 10px 10px 0;
      padding: 0.7rem 0.9rem;
    }

    .productos {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .producto {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .producto:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 30px rgba(15, 23, 42, 0.14);
    }

    .producto img {
      width: 100%;
      height: 170px;
      object-fit: cover;
    }

    .producto-info {
      padding: 0.85rem;
      display: grid;
      gap: 0.5rem;
    }

    .producto-info h3 {
      margin: 0;
      font-size: 1rem;
      min-height: 2.5rem;
    }

    .precio {
      color: var(--primary);
      font-weight: bold;
      margin: 0;
    }

    .cta {
      margin: 0;
      display: inline-block;
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      text-align: center;
      font-size: 0.9rem;
      padding: 0.5rem;
    }

    .hidden { display: none !important; }

    #sin-resultados {
      display: none;
      background: #fff4e5;
      border: 1px solid #fed7aa;
      color: #9a3412;
      border-radius: 10px;
      padding: 0.9rem;
      margin-bottom: 1rem;
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 1rem;
    }

    @media (min-width: 860px) {
      .header-container {
        grid-template-columns: 1.2fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">Envíos y atención personalizada por WhatsApp: +593 99 623 4944</div>

  <header>
    <div class="header-container">
      <div class="brand">
        <img src="https://images.unsplash.com/photo-1584515979956-d9f6e5d09982?auto=format&fit=crop&w=200&q=80" alt="Logo TecnoMedEc" />
        <div>
          <h1>TecnoMedEc - Tienda Médica</h1>
          <p>Catálogo estilo e-commerce con productos para clínicas, hospitales y consultorios.</p>
        </div>
      </div>
      <label class="search-wrap" for="buscador">
        🔎
        <input id="buscador" type="search" placeholder="Buscar por nombre o categoría..." autocomplete="off" />
      </label>
    </div>
  </header>

  <main>
    <div id="sin-resultados">No encontramos productos con ese término. Intenta con otra palabra.</div>
    <div id="catalogo"></div>
  </main>

  <footer>TecnoMedEc · Catálogo digital de productos médicos</footer>

  <script>
    const phoneNumber = '593996234944';

    const categorias = {
      'CUIDADOS': [
        { nombre: 'Guantes de nitrilo (caja x100)', precio: '$9.90', imagen: 'https://images.unsplash.com/photo-1584824486539-53bb4646bdbc?auto=format&fit=crop&w=800&q=80' },
        { nombre: 'Gasas estériles 10x10', precio: '$4.20', imagen: 'https://images.unsplash.com/photo-1581595219315-a187dd40c322?auto=format&fit=crop&w=800&q=80' }
      ],
      'DIAGNÓSTICO': [
        { nombre: 'Tensiómetro digital', precio: '$34.50', imagen: 'https://images.unsplash.com/photo-1582719362891-72f4f3c5f03e?auto=format&fit=crop&w=800&q=80' },
        { nombre: 'Oxímetro de pulso', precio: '$22.90', imagen: 'https://images.unsplash.com/photo-1584515933487-779824d29309?auto=format&fit=crop&w=800&q=80' }
      ],
      'EMERGENCIA': [
        { nombre: 'Botiquín de emergencia', precio: '$28.00', imagen: 'https://images.unsplash.com/photo-1584433144859-1fc3ab64a957?auto=format&fit=crop&w=800&q=80' },
        { nombre: 'Camilla plegable', precio: '$219.00', imagen: 'https://images.unsplash.com/photo-1516549655169-df83a0774514?auto=format&fit=crop&w=800&q=80' }
      ],
      'EQUIPOS': [
        { nombre: 'Nebulizador portátil', precio: '$48.70', imagen: 'https://images.unsplash.com/photo-1612532275214-e4ca76d0e4d1?auto=format&fit=crop&w=800&q=80' },
        { nombre: 'Monitor multiparámetro', precio: '$799.00', imagen: 'https://images.unsplash.com/photo-1538108149393-fbbd81895907?auto=format&fit=crop&w=800&q=80' }
      ],
      'INSTRUMENTAL': [
        { nombre: 'Pinza quirúrgica', precio: '$12.80', imagen: 'https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?auto=format&fit=crop&w=800&q=80' },
        { nombre: 'Set de bisturí', precio: '$18.40', imagen: 'https://images.unsplash.com/photo-1579154204601-01588f351e67?auto=format&fit=crop&w=800&q=80' }
      ],
      'INSUMOS': [
        { nombre: 'Jeringas desechables 10ml', precio: '$7.60', imagen: 'https://images.unsplash.com/photo-1603398938378-e54eab446dde?auto=format&fit=crop&w=800&q=80' },
        { nombre: 'Mascarillas quirúrgicas', precio: '$6.90', imagen: 'https://images.unsplash.com/photo-1584362917165-526a968579e8?auto=format&fit=crop&w=800&q=80' }
      ],
      'MOBILIARIO': [
        { nombre: 'Cama hospitalaria manual', precio: '$599.00', imagen: 'https://images.unsplash.com/photo-1586773860418-d37222d8fce3?auto=format&fit=crop&w=800&q=80' },
        { nombre: 'Mesa de mayo', precio: '$149.90', imagen: 'https://images.unsplash.com/photo-1580281657527-47f249e8f1cb?auto=format&fit=crop&w=800&q=80' }
      ],
      'INDUMENTARIA': [
        { nombre: 'Uniforme médico unisex', precio: '$24.90', imagen: 'https://images.unsplash.com/photo-1612277795421-9bc7706a4a41?auto=format&fit=crop&w=800&q=80' },
        { nombre: 'Bata médica antifluido', precio: '$26.90', imagen: 'https://images.unsplash.com/photo-1622253692010-333f2da6031d?auto=format&fit=crop&w=800&q=80' }
      ],
      'OXIGENOTERAPIA': [
        { nombre: 'Concentrador de oxígeno 5L', precio: '$680.00', imagen: 'https://images.unsplash.com/photo-1584467735871-bfb80b7fcb14?auto=format&fit=crop&w=800&q=80' },
        { nombre: 'Cánula nasal adulto', precio: '$3.50', imagen: 'https://images.unsplash.com/photo-1582719471384-894fbb16e074?auto=format&fit=crop&w=800&q=80' }
      ]
    };

    const catalogo = document.getElementById('catalogo');
    const buscador = document.getElementById('buscador');
    const sinResultados = document.getElementById('sin-resultados');

    function crearCatalogo(filtro = '') {
      catalogo.innerHTML = '';
      const termino = filtro.trim().toLowerCase();
      let totalProductosVisibles = 0;

      for (const [categoria, productos] of Object.entries(categorias)) {
        const filtrados = productos.filter((producto) => {
          const nombre = producto.nombre.toLowerCase();
          const categoriaTxt = categoria.toLowerCase();
          return !termino || nombre.includes(termino) || categoriaTxt.includes(termino);
        });

        if (!filtrados.length) continue;

        const section = document.createElement('section');
        section.className = 'categoria';

        const titulo = document.createElement('h2');
        titulo.textContent = categoria;

        const grid = document.createElement('div');
        grid.className = 'productos';

        filtrados.forEach((producto) => {
          const enlace = document.createElement('a');
          enlace.className = 'producto';

          const mensaje = `Hola, me interesa el producto: ${producto.nombre}. Imagen: ${producto.imagen}`;
          enlace.href = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(mensaje)}`;
          enlace.target = '_blank';
          enlace.rel = 'noopener noreferrer';

          enlace.innerHTML = `
            <img src="${producto.imagen}" alt="${producto.nombre}" loading="lazy" />
            <div class="producto-info">
              <h3>${producto.nombre}</h3>
              <p class="precio">${producto.precio}</p>
              <p class="cta">Comprar por WhatsApp</p>
            </div>
          `;

          grid.appendChild(enlace);
        });

        totalProductosVisibles += filtrados.length;
        section.appendChild(titulo);
        section.appendChild(grid);
        catalogo.appendChild(section);
      }

      sinResultados.style.display = totalProductosVisibles ? 'none' : 'block';
    }

    buscador.addEventListener('input', (event) => {
      crearCatalogo(event.target.value);
    });

    crearCatalogo();
  </script>
</body>
</html>
