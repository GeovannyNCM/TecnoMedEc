<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedicalBuy · Tienda</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f5fafd; padding: 1rem; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Header */
        .header-compacto {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            margin-bottom: 1.2rem;
            border: 1px solid #e0eef9;
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .logo-area i { font-size: 1.5rem; color: #1d7a8f; background: #e3f2f9; padding: 0.4rem; border-radius: 50%; }
        .logo-area h1 { font-size: 1.3rem; }
        
        /* Botón admin */
        .btn-admin {
            background: #f0f7fc;
            color: #2c5f70;
            border: 1px solid #c2ddee;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            text-decoration: none;
        }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-login {
            background: white;
            padding: 2rem;
            border-radius: 30px;
            width: 320px;
        }
        
        .modal-login h3 { margin-bottom: 1.5rem; color: #1f7a8c; }
        .modal-login input {
            width: 100%;
            padding: 0.8rem 1.2rem;
            margin-bottom: 1rem;
            border: 2px solid #d9eaf5;
            border-radius: 40px;
        }
        
        .modal-botones {
            display: flex;
            gap: 10px;
        }
        
        .btn-modal {
            flex: 1;
            padding: 0.7rem;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-ingresar { background: #1f7a8c; color: white; }
        .btn-cerrar { background: #e2edf5; color: #2c5f70; }
        
        /* Filtros */
        .filtros-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin: 1rem 0;
            background: white;
            padding: 0.8rem 1rem;
            border-radius: 40px;
        }
        
        .btn-categoria {
            background: transparent;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-categoria.activo { background: #1f7a8c; color: white; }
        
        /* Grid */
        .categorias-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        
        .hidden-category { display: none !important; }
        
        /* Cards */
        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #d4e6f0;
        }
        
        .img-container {
            width: 100%;
            height: 120px;
            position: relative;
            overflow: hidden;
        }
        
        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .cat-icon-overlay {
            position: absolute;
            top: 6px;
            left: 8px;
            background: rgba(255,255,255,0.95);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.65rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .card-content { padding: 0.8rem; }
        
        .nombre-producto {
            font-size: 0.95rem;
            font-weight: 700;
            height: 2.5rem;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        
        .precio-stock-row {
            display: flex;
            justify-content: space-between;
            background: #f0f7fc;
            border-radius: 30px;
            padding: 0.3rem 0.6rem;
            margin: 0.5rem 0;
        }
        
        .precio { font-size: 1.1rem; font-weight: 700; color: #166b7c; }
        
        .stock-indicator {
            display: flex;
            align-items: center;
            gap: 3px;
            background: white;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-size: 0.65rem;
        }
        
        .stock-indicator.disponible { color: #1c7242; background: #e2ffee; }
        .stock-indicator.agotado { color: #b13e3e; background: #ffe9e9; }
        
        .control-cantidad {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #d0e2f0;
            border-radius: 30px;
            padding: 0.1rem 0.1rem 0.1rem 0.8rem;
            margin: 0.5rem 0;
        }
        
        .control-cantidad input {
            width: 50px;
            border: none;
            background: #eef7fd;
            text-align: center;
            padding: 0.3rem 0;
            border-radius: 30px;
        }
        
        .btn-wsp {
            background: #25D366;
            color: white;
            border: none;
            padding: 0.5rem;
            border-radius: 30px;
            width: 100%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .disabled-btn { opacity: 0.4; pointer-events: none; background: #98aebb; }
        .contador-productos { margin: 0.5rem 0; color: #1f7a8c; }
        .footer-note { margin-top: 2rem; text-align: center; color: #5f7e8f; }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="header-compacto">
        <div class="logo-area">
            <i class="fas fa-briefcase-medical"></i>
            <h1>MedicalBuy</h1>
        </div>
        <button class="btn-admin" id="btnAbrirLogin">
            <i class="fas fa-user-shield"></i> Admin
        </button>
    </div>

    <!-- Modal Login -->
    <div class="modal-overlay" id="modalLogin">
        <div class="modal-login">
            <h3><i class="fas fa-lock"></i> Acceso Admin</h3>
            <input type="text" id="username" placeholder="Usuario">
            <input type="password" id="password" placeholder="Contraseña">
            <div class="modal-botones">
                <button class="btn-modal btn-ingresar" id="btnIngresar">Ingresar</button>
                <button class="btn-modal btn-cerrar" id="btnCerrarModal">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Filtros -->
    <div class="filtros-container" id="filtrosCategorias"></div>
    <div class="contador-productos" id="contadorProductos">Cargando productos...</div>
    
    <!-- Grid -->
    <div class="categorias-grid" id="appGrid">
        <div style="grid-column: 1/-1; text-align: center; padding: 2rem;">
            <i class="fas fa-spinner fa-pulse"></i> Cargando...
        </div>
    </div>

    <div class="footer-note">
        <i class="fas fa-cloud"></i> Productos sincronizados desde Firebase
    </div>
</div>

<script>
    // ========== FIREBASE ==========
 const firebaseConfig = {
  apiKey: "AIzaSyDC9xFg5QypLX-ZnXBN55FmME39Lot9hLY",
  authDomain: "medicalbuy-db.firebaseapp.com",
  databaseURL: "https://medicalbuy-db-default-rtdb.firebaseio.com",
  projectId: "medicalbuy-db",
  storageBucket: "medicalbuy-db.firebasestorage.app",
  messagingSenderId: "269696757008",
  appId: "1:269696757008:web:9b74ecbed3f0e315e0c995",
  measurementId: "G-664NJ16CLN"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

    // ========== CONFIG ==========
    const WHATSAPP_NUMBER = "5491122334455";
    const ADMIN_USER = "Admin";
    const ADMIN_PASS = "AdminTecno";

    // ========== DOM ==========
    const modal = document.getElementById('modalLogin');
    const btnAbrirLogin = document.getElementById('btnAbrirLogin');
    const btnCerrarModal = document.getElementById('btnCerrarModal');
    const btnIngresar = document.getElementById('btnIngresar');
    const username = document.getElementById('username');
    const password = document.getElementById('password');
    const grid = document.getElementById('appGrid');
    const filtrosDiv = document.getElementById('filtrosCategorias');
    const contadorSpan = document.getElementById('contadorProductos');

    let productos = [];
    let categoriaActiva = 'todas';

    // ========== LOGIN MODAL ==========
    btnAbrirLogin.addEventListener('click', () => {
        modal.style.display = 'flex';
        username.value = '';
        password.value = '';
    });

    btnCerrarModal.addEventListener('click', () => {
        modal.style.display = 'none';
    });

    btnIngresar.addEventListener('click', () => {
        if (username.value === ADMIN_USER && password.value === ADMIN_PASS) {
            modal.style.display = 'none';
            window.open('admin.html', '_blank');
        } else {
            alert('Usuario o contraseña incorrectos');
        }
    });

    modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.style.display = 'none';
    });

    // ========== CARGAR PRODUCTOS ==========
    function cargarProductos() {
        database.ref('productos').on('value', (snapshot) => {
            const data = snapshot.val();
            productos = data ? Object.keys(data).map(key => ({ ...data[key], id: key })) : [];
            renderizarFiltros();
            renderizarTarjetas();
        });
    }

    // ========== RENDERIZAR FILTROS ==========
    function renderizarFiltros() {
        const categorias = [...new Set(productos.map(p => p.categoria))].sort();
        let html = `<button class="btn-categoria activo" data-categoria="todas"><i class="fas fa-border-all"></i> Todos</button>`;
        
        categorias.forEach(cat => {
            const icono = productos.find(p => p.categoria === cat)?.icono || 'fa-tag';
            html += `<button class="btn-categoria" data-categoria="${cat}"><i class="fas ${icono}"></i> ${cat}</button>`;
        });
        
        filtrosDiv.innerHTML = html;
        
        document.querySelectorAll('.btn-categoria').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.btn-categoria').forEach(b => b.classList.remove('activo'));
                this.classList.add('activo');
                categoriaActiva = this.dataset.categoria;
                aplicarFiltro();
            });
        });
    }

    // ========== APLICAR FILTRO ==========
    function aplicarFiltro() {
        const tarjetas = document.querySelectorAll('.card');
        let visibles = 0;
        
        tarjetas.forEach(card => {
            if (categoriaActiva === 'todas' || card.dataset.categoria === categoriaActiva) {
                card.classList.remove('hidden-category');
                visibles++;
            } else {
                card.classList.add('hidden-category');
            }
        });
        
        contadorSpan.textContent = categoriaActiva === 'todas' 
            ? `Mostrando todos (${visibles})` 
            : `Mostrando ${categoriaActiva}: ${visibles}`;
    }

    // ========== RENDERIZAR TARJETAS ==========
    function renderizarTarjetas() {
        if (productos.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center;">No hay productos</div>';
            return;
        }
        
        let html = '';
        productos.forEach((prod, idx) => {
            const tieneStock = prod.stock > 0;
            html += `
                <div class="card" data-categoria="${prod.categoria}">
                    <div class="img-container">
                        <img src="${prod.imagen}" onerror="this.src='https://placehold.co/300x200/dfeef8/3b7e9c?text=IMG'">
                        <span class="cat-icon-overlay"><i class="fas ${prod.icono}"></i> ${prod.categoria}</span>
                    </div>
                    <div class="card-content">
                        <div class="nombre-producto">${prod.producto}</div>
                        <div class="precio-stock-row">
                            <span class="precio">$${prod.precio.toLocaleString()} <small>/${prod.unidad}</small></span>
                            <span class="stock-indicator ${tieneStock ? 'disponible' : 'agotado'}">
                                <i class="fas ${tieneStock ? 'fa-check-circle' : 'fa-times-circle'}"></i> ${tieneStock ? prod.stock : 'SIN'}
                            </span>
                        </div>
                        <div class="control-cantidad">
                            <label><i class="fas fa-sort-numeric-up"></i> Cant</label>
                            <input type="number" class="input-cantidad" value="1" min="1" max="${prod.stock}" ${tieneStock ? '' : 'disabled'}>
                        </div>
                        <button class="btn-wsp ${tieneStock ? '' : 'disabled-btn'}">
                            <i class="fab fa-whatsapp"></i> Pedir
                        </button>
                    </div>
                </div>
            `;
        });
        
        grid.innerHTML = html;
        aplicarFiltro();
        
        // Eventos WhatsApp
        document.querySelectorAll('.btn-wsp:not(.disabled-btn)').forEach((btn, i) => {
            btn.addEventListener('click', () => {
                const prod = productos[i];
                const cant = document.querySelectorAll('.input-cantidad')[i]?.value || 1;
                const total = prod.precio * cant;
                const msg = `🛒 *Pedido*%0A▪️ ${prod.producto}%0A▪️ Cant: ${cant}%0A▪️ Total: $${total.toLocaleString()}`;
                window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`, '_blank');
            });
        });
    }

    // ========== INICIAR ==========
    cargarProductos();
</script>
</body>
</html>
